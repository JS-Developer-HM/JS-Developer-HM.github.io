<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Safe</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <h2 class="title">حساب فرق التوقيت</h2>
    <div class="text-center mt-3">
        <img class="logo" src="./assets/schedule.png" alt="">
    </div>
    <div class="container">
        <h6 id="current-time" class="time text-center mt-4"></h6>
        <div class="text-center mt-3">
            <input id="dvr-time" class="input" placeholder="Dvr Live Time ? " />
            <div id="hide">
                <div id="dvr-diff" class="dvr-time-differnce fw-bold  mt-3">
                    <div class="row">
                        <div class="col">
                            <div class="time-type">قبل / بعد</div>
                            <div id="af-bf" class="time-dif"></div>
                        </div>
                        <div class="col">
                            <div class="time-type">يوم</div>
                            <div id="day" class="time-dif"></div>
                        </div>
                        <div class="col">
                            <div class="time-type">ساعة</div>
                            <div id="hr" class="time-dif"></div>
                        </div>
                        <div class="col">
                            <div class="time-type">دقائق</div>
                            <div id="min" class="time-dif"></div>
                        </div>
                    </div>
                </div>
                <input id="dif-time" class="input mt-3" placeholder="Time You Want " />
                <h4 id="correct-time" class="mt-3 text-success fw-bold">11/11/2022 8:50</h4>
            </div>

        </div>
    </div>


    <script src="./js/jquery.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/moment.js"></script>
    <script src="./js/mobiscroll.jquery.min.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
